name: CI Windows
on:
  push:
    branches: winbuild
jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
        - {cc: clang-cl, cxx: clang-cl, config: Release, cmake_args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="/DWIN32 /D_WINDOWS /W3 /D_HAS_EXCEPTIONS=0 /GR- /GS- -Xclang -fvisibility-inlines-hidden" }

    steps:
    - uses: actions/checkout@v2
    - uses: Trass3r/setup-cpp@master
    - shell: cmd
      if: failure()
      run: |
        curl -Ls -o "LLVM-10.0.0-win64.exe" "https://github.com/llvm/llvm-project/releases/download/llvmorg-10.0.0/LLVM-10.0.0-win64.exe"
        LLVM-10.0.0-win64.exe /S
    - uses: ilammy/msvc-dev-cmd@v1
    - name: build
      env:
        CC: ${{ matrix.config.cc }}
        CXX: ${{ matrix.config.cxx }}
      shell: cmd
      run: |
        set PATH=C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Tools\Llvm\bin;%PATH%
        mkdir build && cd build
        cmake -G Ninja -DLLVM_ENABLE_ASSERTIONS=ON -DLLVM_INCLUDE_EXAMPLES=OFF -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF -DLLVM_INCLUDE_TESTS=OFF -DCLANG_INCLUDE_TESTS=OFF -DCLANG_INCLUDE_DOCS=OFF -DCLANG_ENABLE_ARCMT=OFF -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra;compiler-rt" -DLLVM_OPTIMIZED_TABLEGEN=ON -DLLVM_TARGETS_TO_BUILD="X86" -DLLVM_ENABLE_UNWIND_TABLES=OFF -DBUILD_SHARED_LIBS=ON ${{ matrix.config.cmake_args }} ../llvm/
        ninja llvm-tblgen
        dir /s/b *.dll
    - name: install
      run: |
        cd build
        ninja install
